name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/minzzle-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # ── Build & push Docker image (server) ────────────────────────
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # ── Build React frontend ──────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci && npm run build

      # ── Set up SSH ────────────────────────────────────────────────
      # Note: ssh-keyscan is intentionally omitted — all ssh/rsync calls
      # below use StrictHostKeyChecking=no, so known_hosts is not consulted.
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # ── Test SSH connection ───────────────────────────────────────
      - name: Test SSH
        run: |
          ssh -vvv -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo SSH_OK" 2>&1 | tail -50

      # ── Deploy static frontend ────────────────────────────────────
      - name: Deploy web
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            web/dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/minzzle/web/"

      # ── Sync docker-compose.yml to VPS ───────────────────────────
      - name: Sync compose file
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy/docker-compose.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/minzzle/docker-compose.yml"

      # ── Sync SQLite database ──────────────────────────────────────
      - name: Sync database
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p ~/minzzle/data"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server/src/GamesHub.Server/Data/minzzle.db \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/minzzle/data/minzzle.db"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "rm -f ~/minzzle/data/minzzle.db-wal ~/minzzle/data/minzzle.db-shm"

      # ── Pull new image & restart container ────────────────────────
      - name: Deploy server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd ~/minzzle && docker compose pull && docker compose up -d"
