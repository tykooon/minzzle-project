# Nginx virtual host for minzzle.com
# Place at: /etc/nginx/sites-available/minzzle.com
# Symlink:  ln -sf /etc/nginx/sites-available/minzzle.com /etc/nginx/sites-enabled/
#
# SSL certificates are managed by Certbot — run:
#   certbot --nginx -d minzzle.com -d www.minzzle.com

server {
    listen 80;
    server_name minzzle.com www.minzzle.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name minzzle.com www.minzzle.com;

    # Certbot will insert the ssl_certificate directives here.

    root /var/www/minzzle/web;
    index index.html;

    # API — proxy to ASP.NET Core container
    location /api/ {
        proxy_pass         http://localhost:5129;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA — all unknown routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
